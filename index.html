<script>
function sortMods(attribute) {
    const container = document.querySelector('.scroll-block');
    const items = Array.from(container.querySelectorAll('.text-line'));

    // Сортировка: от большего к меньшему
    items.sort((a, b) => {
        return b.getAttribute(attribute) - a.getAttribute(attribute);
    });
    container.innerHTML = '';
    items.forEach(item => container.appendChild(item));
}
// Привязываем функции к кнопкам
document.getElementById('sort-utility').onclick = () => sortMods('data-utility');
document.getElementById('sort-hardcore').onclick = () => sortMods('data-hardcore');
document.getElementById('sort-new').onclick = () => sortMods('data-new');
</script>
